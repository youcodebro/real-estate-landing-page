[build]
  # Directory to run build command from
  base = "."
  
  # Build command
  command = "npm run build"
  
  # Directory to publish (configured as 'build' in vite.config.ts)
  publish = "build"

# Node version
[build.environment]
  NODE_VERSION = "18"

# Headers for better security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect rules for SPA (optional, if you plan to add React Router later)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
